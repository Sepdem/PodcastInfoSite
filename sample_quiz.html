<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redaktionsschluss — Echt oder Fake?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Archivo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --desk: #1b2027;
    --desk-2: #14171d;
    --paper: #f2e9d3;
    --paper-shadow: #d8caa4;
    --ink: #262117;
    --ink-soft: #5b5442;
    --stamp-red: #a8322c;
    --stamp-green: #3f7a52;
    --gold: #c9a15a;
    --line: rgba(38,33,23,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, #262c37 0%, transparent 55%),
      radial-gradient(ellipse at 90% 110%, #20252e 0%, transparent 50%),
      var(--desk);
    background-color:var(--desk);
    font-family:'Archivo', sans-serif;
    color:var(--paper);
    min-height:100vh;
    padding:0 0 80px;
    position:relative;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, transparent 1px, transparent 3px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, transparent 1px, transparent 3px);
    pointer-events:none;
    z-index:0;
  }

  header{
    position:relative;
    z-index:1;
    padding:48px 20px 28px;
    text-align:center;
    border-bottom:1px solid rgba(201,161,90,0.25);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
  }
  h1{
    font-family:'Special Elite', cursive;
    font-size:clamp(28px, 5vw, 52px);
    margin:0 0 12px;
    line-height:1.15;
    color:#f6efdd;
    text-shadow:0 2px 0 rgba(0,0,0,0.3);
  }
  .sub{
    font-size:15px;
    color:#b9bfc9;
    max-width:520px;
    margin:0 auto;
    line-height:1.5;
  }

  .board{
    max-width:920px;
    margin:36px auto 0;
    padding:0 20px;
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    gap:30px;
  }

  .card{
    position:relative;
    background:var(--paper);
    color:var(--ink);
    border-radius:2px;
    padding:26px 28px 22px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.5) inset,
      0 14px 26px rgba(0,0,0,0.35);
    transform:rotate(var(--r, -0.6deg));
    transition:transform .25s ease;
  }
  .card:nth-child(odd){ --r: 0.7deg; }
  .card:nth-child(3n){ --r: -1.1deg; }
  .card:hover{ transform:rotate(0deg) translateY(-2px); }

  .pin{
    position:absolute;
    top:-11px; left:26px;
    width:16px; height:16px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 30%, #e2635c, var(--stamp-red) 70%);
    box-shadow:0 3px 5px rgba(0,0,0,0.45);
  }

  .card-meta{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    border-bottom:1px dashed var(--line);
    padding-bottom:8px;
  }

  .headline{
    font-family:'Special Elite', cursive;
    font-size:clamp(17px, 2.4vw, 21px);
    line-height:1.45;
    margin:0 0 18px;
  }

  .choices{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .choice-btn{
    font-family:'Archivo', sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:10px 18px;
    border-radius:3px;
    border:2px solid var(--ink);
    background:transparent;
    color:var(--ink);
    cursor:pointer;
    transition:all .15s ease;
  }
  .choice-btn:hover{ background:rgba(38,33,23,0.08); }
  .choice-btn.selected.echt{ background:var(--stamp-green); border-color:var(--stamp-green); color:#f2e9d3; }
  .choice-btn.selected.fake{ background:var(--stamp-red); border-color:var(--stamp-red); color:#f2e9d3; }

  .verdict{
    display:none;
    align-items:center;
    gap:14px;
    margin-top:16px;
    padding-top:14px;
    border-top:1px dashed var(--line);
  }
  .card.revealed .choices{ display:none; }
  .card.revealed .verdict{ display:flex; }

  .stamp{
    font-family:'Special Elite', cursive;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:6px 14px;
    border:3px solid;
    border-radius:4px;
    transform:rotate(-6deg) scale(0);
    display:inline-block;
    white-space:nowrap;
    animation:stamp-in .35s ease-out forwards;
  }
  @keyframes stamp-in{
    0%{ transform:rotate(-6deg) scale(1.8); opacity:0; }
    60%{ transform:rotate(-6deg) scale(0.92); opacity:1; }
    100%{ transform:rotate(-6deg) scale(1); opacity:1; }
  }
  .stamp.echt{ color:var(--stamp-green); border-color:var(--stamp-green); }
  .stamp.fake{ color:var(--stamp-red); border-color:var(--stamp-red); }

  .verdict-text{
    font-size:13px;
    line-height:1.5;
    color:var(--ink-soft);
  }
  .verdict-text b{ color:var(--ink); }
  .correct-flag{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    font-weight:600;
    padding:3px 8px;
    border-radius:2px;
    margin-left:8px;
  }
  .correct-flag.yes{ background:rgba(63,122,82,0.18); color:#2c5c3c; }
  .correct-flag.no{ background:rgba(168,50,44,0.18); color:#8c2a25; }

  .action-row{
    max-width:920px;
    margin:38px auto 0;
    padding:0 20px;
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    position:relative;
    z-index:1;
  }
  .reveal-btn{
    font-family:'Archivo', sans-serif;
    font-weight:900;
    font-size:15px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:16px 40px;
    border-radius:3px;
    border:none;
    background:var(--gold);
    color:#1b2027;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(201,161,90,0.25);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .reveal-btn:disabled{
    opacity:0.4;
    cursor:not-allowed;
    box-shadow:none;
  }
  .reveal-btn:not(:disabled):hover{ transform:translateY(-2px); box-shadow:0 14px 30px rgba(201,161,90,0.35); }

  .reset-btn{
    font-family:'Archivo', sans-serif;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:16px 32px;
    border-radius:3px;
    border:2px solid var(--gold);
    background:transparent;
    color:var(--gold);
    cursor:pointer;
    transition:all .15s ease;
  }
  .reset-btn:hover{ background:rgba(201,161,90,0.12); transform:translateY(-2px); }

  .score-panel{
    max-width:520px;
    margin:26px auto 0;
    padding:0 20px;
    text-align:center;
    position:relative;
    z-index:1;
    display:none;
  }
  .score-panel.show{ display:block; }
  .score-number{
    font-family:'Special Elite', cursive;
    font-size:52px;
    color:var(--gold);
  }
  .score-label{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:#b9bfc9;
  }
  .progress{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:#8890a0;
    text-align:center;
    margin-top:14px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Redaktionsschluss · Faktencheck-Ausgabe</div>
  <h1>Echt oder Fake?</h1>
  <p class="sub">Acht Schlagzeilen vom 15. Juli 2026. Vier davon sind verbürgt, vier sind frei erfunden. Klick dich durch und stufe jede Meldung ein — die Auflösung gibt's am Ende.</p>
</header>

<div class="board" id="board"></div>

<div class="action-row">
  <button class="reveal-btn" id="revealBtn" disabled>Auflösung anzeigen</button>
  <button class="reset-btn" id="resetBtn">Neu starten</button>
</div>

<div class="progress" id="progress">0 von 6 eingestuft</div>

<div class="score-panel" id="scorePanel">
  <div class="score-number" id="scoreNumber">0/6</div>
  <div class="score-label">richtig erkannt</div>
</div>

<script>
const headlines = [
  {
    id: 1,
    meta: "Politik · Ausland",
    text: "Von der Leyen besucht zum elften Mal seit Kriegsbeginn die Ukraine und kündigt neue Initiativen zur Verteidigungsindustrie an.",
    real: true,
    explain: "EU-Kommissionspräsidentin von der Leyen war am 15.07.2026 tatsächlich zu ihrem elften Kiew-Besuch seit Kriegsbeginn vor Ort und sprach dort über eine engere Verzahnung der Verteidigungsindustrien."
  },
  {
    id: 2,
    meta: "Sport · Fußball-WM",
    text: "Spanien erreicht nach 16 Jahren wieder das Finale einer Fußball-WM, nach einem 2:0-Halbfinalsieg.",
    real: true,
    explain: "Der amtierende Europameister Spanien gewann sein Halbfinale bei der WM 2026 mit 2:0 und steht damit erstmals seit 16 Jahren wieder im WM-Finale."
  },
  {
    id: 3,
    meta: "Bildung · EU",
    text: "Die EU führt ab 2027 einen verpflichtenden „Digitalen Führerschein” für alle Schüler ab der 5. Klasse ein.",
    real: false,
    explain: "Frei erfunden. Es gibt aktuell keine derartige EU-weite Pflichtregelung für einen „Digitalen Führerschein” ab der 5. Klasse."
  },
  {
    id: 4,
    meta: "Politik · Europa",
    text: "Der Grenzübergang zwischen Gibraltar und Spanien ist jetzt kontrollfrei.",
    real: true,
    explain: "Im Zuge des Übergangs Gibraltars in enger Anbindung an Spanien fallen die Grenzkontrollen an diesem Übergang tatsächlich weg."
  },
  {
    id: 5,
    meta: "Technologie · KI",
    text: "Google stellt eine neue KI vor, die Träume in Echtzeit aufzeichnen und als Video abspielen kann.",
    real: false,
    explain: "Frei erfunden. Es existiert keine Technologie, die Träume in Echtzeit auslesen und als Video darstellen kann — das ist mit heutiger Neurotechnik nicht möglich."
  },
  {
    id: 6,
    meta: "Sport · Fußball",
    text: "DFB-Präsident Neuendorf und Red-Bull-Chef Mintzlaff einigen sich auf einen Deal, der Jürgen Klopps Weg zum Bundestrainer freimacht.",
    real: true,
    explain: "Laut Berichten haben sich DFB-Präsident Neuendorf und Red-Bull-Chef Mintzlaff auf eine Kompensationslösung geeinigt, die Klopps vorzeitigen Ausstieg bei Red Bull und den Wechsel zum DFB ermöglicht."
  },
  {
    id: 7,
    meta: "Verkehr · Bahn",
    text: "Die Deutsche Bahn startet ein Pilotprojekt mit vollständig solarbetriebenen ICE-Waggons auf der Strecke Berlin–München.",
    real: false,
    explain: "Frei erfunden. Es gibt kein Pilotprojekt der Deutschen Bahn mit vollständig solarbetriebenen ICE-Waggons — mit heutiger Solartechnik ließe sich ein Zug dieser Größe ohnehin nicht allein über Dachpaneele antreiben."
  },
  {
    id: 8,
    meta: "Bildung · Bayern",
    text: "Das bayerische Kultusministerium führt ab dem Schuljahr 2027/28 ein verpflichtendes Fach „Medienkompetenz und KI” ab der 7. Klasse ein.",
    real: false,
    explain: "Frei erfunden. Eine solche verpflichtende Fächereinführung wurde vom bayerischen Kultusministerium bislang nicht angekündigt."
  }
];

const state = {};

const board = document.getElementById('board');
const revealBtn = document.getElementById('revealBtn');
const resetBtn = document.getElementById('resetBtn');
const progressEl = document.getElementById('progress');
const scorePanel = document.getElementById('scorePanel');
const scoreNumber = document.getElementById('scoreNumber');

function renderCards(){
  headlines.forEach(h => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + h.id;
    card.innerHTML = `
      <div class="pin"></div>
      <div class="card-meta"><span>${h.meta}</span><span>Meldung #${h.id}</span></div>
      <p class="headline">${h.text}</p>
      <div class="choices">
        <button class="choice-btn" data-val="true">Echt</button>
        <button class="choice-btn" data-val="false">Fake</button>
      </div>
      <div class="verdict"></div>
    `;
    board.appendChild(card);

    const buttons = card.querySelectorAll('.choice-btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.val === 'true';
        state[h.id] = val;
        buttons.forEach(b => b.classList.remove('selected','echt','fake'));
        btn.classList.add('selected', val ? 'echt' : 'fake');
        updateProgress();
      });
    });
  });
}

function updateProgress(){
  const answered = Object.keys(state).length;
  progressEl.textContent = `${answered} von ${headlines.length} eingestuft`;
  revealBtn.disabled = answered < headlines.length;
}

revealBtn.addEventListener('click', () => {
  let score = 0;
  headlines.forEach(h => {
    const card = document.getElementById('card-' + h.id);
    const userSaidReal = state[h.id];
    const correct = userSaidReal === h.real;
    if(correct) score++;

    const verdict = card.querySelector('.verdict');
    verdict.innerHTML = `
      <span class="stamp ${h.real ? 'echt' : 'fake'}">${h.real ? 'Verbürgt' : 'Fake'}</span>
      <span class="verdict-text">
        ${h.explain}
        <span class="correct-flag ${correct ? 'yes' : 'no'}">${correct ? 'von dir richtig erkannt' : 'von dir falsch eingestuft'}</span>
      </span>
    `;
    card.classList.add('revealed');
  });

  scoreNumber.textContent = `${score}/${headlines.length}`;
  scorePanel.classList.add('show');
  revealBtn.disabled = true;
  revealBtn.textContent = 'Ausgewertet';
  progressEl.textContent = '';
  scorePanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
});

resetBtn.addEventListener('click', () => {
  Object.keys(state).forEach(key => delete state[key]);
  board.innerHTML = '';
  renderCards();
  updateProgress();
  scorePanel.classList.remove('show');
  revealBtn.textContent = 'Auflösung anzeigen';
  revealBtn.disabled = true;
});

renderCards();
updateProgress();
</script>

</body>
</html>
